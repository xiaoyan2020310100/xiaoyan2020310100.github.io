{% include base_path %}

<span class="archive__item-citation" style="color: #444444; font-weight: normal; font-size: 1.0em; line-height: 1.5;">
  {{ post.citation }}

  {% if post.paperurl %}
    <small style="font-size: 0.8em; margin-left: 5px;">
      <a href="{{ post.paperurl }}" target="_blank" style="text-decoration: none; color: #007bff;">[PDF]</a>
    </small>
  {% endif %}
</span>
